<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Aqua Fern Boutique</title>
<link rel="icon" type="image/png" href="images/icon-192.png">

<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a4a3e">
</head>
<script src="js/cart.js"></script>
<script type="module" src="js/api.js"></script>
<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <a href="index.html"><img src="images/a.png"></a>
    <h3>Aqua Fern Boutique</h3>
  </div>

  <ul>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="aboutus.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="log-in.html" id="nav-login-btn">Login</a></li>
    <li id="nav-signup-item"><a href="sign-up.html">Signup</a></li>
    <li><a href="#" onclick="toggleCart()"> Cart(<span id="cart-count">0</span>)</a></li>
  </ul>
</nav>

<!-- CONTACT SECTION -->
<section class="contact">
  <h2>Contact Us🌿</h2>
  <p>We’d love To Hear From You!</p>

  <div class="contact-box">
    <form id="contact-form">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button class="btn">Send Message</button>
    </form>
  </div>
</section>

<footer>
    <div class="logo">
        <a href="index.html"><img src="images/a.png" alt="logo"></a>
    </div>

    <p>© 2026 Aqua Fern Boutique — Home-Ready Plants Delivered</p>
    <p>Email: aquafernboutique@gmail.com</p>

    <hr class="footer-line">

    <div class="socials">
        <a href="https://instagram.com"><img src="https://cdn-icons-png.flaticon.com/128/1384/1384015.png"></a>
        <a href="https://tiktok.com"><img src="https://cdn-icons-png.flaticon.com/128/3116/3116491.png"></a>
        <a href="https://pinterest.com"><img src="https://cdn-icons-png.flaticon.com/128/2175/2175205.png"></a>
        <a href="https://wa.me/1234567890"><img src="https://cdn-icons-png.flaticon.com/128/733/733641.png"></a>
        <a href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/128/2168/2168281.png"></a>
    
      </div>
</footer>
<div id="cart-panel" style="display:none;">
   <button onclick="toggleCart()" class="close-cart">Close</button>
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const loginNav = document.querySelector('#nav-login-btn');
        const status = sessionStorage.getItem('isLoggedIn');
        const name = sessionStorage.getItem('userName');

        if (status === 'true' && loginNav) {
            loginNav.innerText = `Hi, ${name} 💐`;
            loginNav.href = "#"; 
            loginNav.style.color = "#a18b0e";
        }
    });
</script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const loginLink = document.querySelector('#nav-login-btn');
        const signupItem = document.querySelector('#nav-signup-item');
        
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userName = sessionStorage.getItem('userName');

        if (isLoggedIn === 'true' && loginLink) {
            loginLink.innerText = `Hi, ${userName || 'User'} 💐`;
            loginLink.href = "#"; 
            loginLink.style.color = "#a18b0e";
            loginLink.style.fontWeight = "bold";

            if (signupItem) signupItem.style.display = 'none';

            const navList = document.querySelector('nav ul');
            const logoutLi = document.createElement('li');
            logoutLi.innerHTML = `<a href="#" style="color: #ff6b6b; cursor: pointer;">Logout</a>`;
            
            logoutLi.addEventListener('click', (e) => {
                e.preventDefault();
                if(confirm("Are you sure you want to log out?")) {
                    sessionStorage.clear(); 
                    window.location.href = 'index.html';
                }
            });
            
            navList.appendChild(logoutLi);
        }
    });
</script>

<script type="module">
    import { db, collection, addDoc } from './js/auth.js';

    const contactForm = document.getElementById('contact-form');

    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = contactForm.querySelector('input[type="text"]').value;
        const email = contactForm.querySelector('input[type="email"]').value;
        const message = contactForm.querySelector('textarea').value;

        try {
            await addDoc(collection(db, "messages"), {
                senderName: name,
                senderEmail: email,
                text: message,
                timestamp: new Date()
            });

            alert(`Thank you, ${name}! 🌿 Your message has been saved and will be reviewed shortly.`);
            contactForm.reset();
        } catch (error) {
            console.error("Error adding message: ", error);
            alert("Oops! Something went wrong. Please try again.");
        }
    });
</script>

</body>
</html>
