<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-In | Aqua Fern Boutique</title>
<link rel="stylesheet" href="css/style.css">
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/api.js"></script>
<script src="js/cart.js"></script>
</head>



<body>

<nav>
   <div class="logo">
        <a href="index.html"><img src="images/a.png" alt="logo"></a>
        <h3>Aqua Fern Boutique</h3>
    </div>

    <ul>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="aboutus.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="log-in.html" id="nav-login-btn">Log-in</a></li>
        <li id="nav-signup-item"><a href="sign-up.html">Sign-Up</a></li>
        <li><a href="#" onclick="toggleCart()"> Cart (<span id="cart-count">0</span>)</a></li>
    </ul>
</nav>

<section class="contact">
  <h2>Welcome Back🌿</h2>
  <p>Login To Your Account</p>

  <div class="contact-box">
    <form id="login-form">
        <input type="text" placeholder="Full Name"> 
        <input type="email" class="email-field" placeholder="Email" required>
        <input type="password" class="password-field" placeholder="Password" required>
        <button type="submit" class="btn" id="login-btn">Log In</button>
    </form>

    <div class="extra">
      <p>Account does not exist? <a href="sign-up.html">Sign Up</a></p>
    </div>
  </div>
</section>


<footer>
    <div class="logo">
        <a href="index.html"><img src="images/a.png" alt="logo"></a>
    </div>

    <p>© 2026 Aqua Fern Boutique — Home-Ready Plants Delivered</p>

    <hr class="footer-line">

    <div class="socials">
        <a href="https://instagram.com"><img src="https://cdn-icons-png.flaticon.com/128/1384/1384015.png"></a>
        <a href="https://tiktok.com"><img src="https://cdn-icons-png.flaticon.com/128/3116/3116491.png"></a>
        <a href="https://pinterest.com"><img src="https://cdn-icons-png.flaticon.com/128/2175/2175205.png"></a>
        <a href="https://wa.me/1234567890"><img src="https://cdn-icons-png.flaticon.com/128/733/733641.png"></a>
        <a href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/128/2168/2168281.png"></a>
    </div>
</footer>
<div id="cart-panel" style="display:none;">
   <button onclick="toggleCart()" class="close-cart">Close</button>
  <h2>Your Cart</h2>
  <div id="cart-items"></div>
</div>

<script type="module">
    const loginForm = document.querySelector('#login-form');
    
    if (loginForm) {
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = loginForm.querySelector('input[type="text"]').value || "Friend";

            alert(`Welcome back, ${name}! 🌿`);

            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userName', name);

            window.location.href = 'shop.html';
        });
    }
</script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const loginNav = document.querySelector('#nav-login-btn');
        const status = sessionStorage.getItem('isLoggedIn');
        const name = sessionStorage.getItem('userName');

        if (status === 'true' && loginNav) {
            loginNav.innerText = `Hi, ${name || 'User'} 💐`;
            loginNav.href = "#"; 
            loginNav.style.color = "#a18b0e";
        }
    });
</script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const loginLink = document.querySelector('#nav-login-btn');
        const signupItem = document.querySelector('#nav-signup-item');
        
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        const userName = sessionStorage.getItem('userName');

        if (isLoggedIn === 'true' && loginLink) {
            loginLink.innerText = `Hi, ${userName || 'User'} 💐`;
            loginLink.href = "#"; 
            loginLink.style.color = "#a18b0e";
            loginLink.style.fontWeight = "bold";

            if (signupItem) signupItem.style.display = 'none';

            const navList = document.querySelector('nav ul');
            const logoutLi = document.createElement('li');
            logoutLi.innerHTML = `<a href="#" style="color: #ff6b6b; cursor: pointer;">Logout</a>`;
            
            logoutLi.addEventListener('click', (e) => {
                e.preventDefault();
                if(confirm("Are you sure you want to log out?")) {
                    sessionStorage.clear(); 
                    window.location.href = 'index.html';
                }
            });
            
            navList.appendChild(logoutLi);
        }
    });
</script>

</body>
</html>
